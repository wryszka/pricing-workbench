# Factory training — real Poisson GLM fitting for factory-run variants.
# Triggered by the Model Factory Real tab on approval.
resources:
  jobs:
    factory_train_real:
      name: "v1 — Factory training (real)"
      parameters:
        - name: catalog_name
          default: ${var.catalog_name}
        - name: schema_name
          default: ${var.schema_name}
        - name: factory_run_id
          default: ""
        - name: max_variants
          default: "15"

      tasks:
        - task_key: train
          notebook_task:
            notebook_path: ../src/04_models/production/factory_train.py
            base_parameters:
              catalog_name:    ${var.catalog_name}
              schema_name:     ${var.schema_name}
              factory_run_id:  "{{job.parameters.factory_run_id}}"
              max_variants:    "{{job.parameters.max_variants}}"
          environment_key: factory_env

      environments:
        - environment_key: factory_env
          spec:
            client: "5"
            dependencies:
              - mlflow
              - statsmodels
              - scikit-learn
              - pandas
