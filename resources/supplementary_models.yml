# Supplementary Pricing Models — Fraud and Retention
# These prove the point: "your pricing team isn't limited to freq/sev —
# layer in fraud, retention, and other signals on the same platform."

resources:
  jobs:
    train_supplementary_models:
      name: "Train Supplementary Models (Fraud + Retention)"
      parameters:
        - name: catalog_name
          default: ${var.catalog_name}
        - name: schema_name
          default: ${var.schema_name}

      tasks:
        - task_key: fraud_propensity
          notebook_task:
            notebook_path: ../src/04_models/model_05_fraud_propensity.py
            base_parameters:
              catalog_name: ${var.catalog_name}
              schema_name: ${var.schema_name}
          environment_key: default

        - task_key: retention_churn
          notebook_task:
            notebook_path: ../src/04_models/model_06_retention.py
            base_parameters:
              catalog_name: ${var.catalog_name}
              schema_name: ${var.schema_name}
          environment_key: default

        - task_key: enriched_pricing
          depends_on:
            - task_key: fraud_propensity
            - task_key: retention_churn
          notebook_task:
            notebook_path: ../src/05_use_cases/uc5_enriched_pricing.py
            base_parameters:
              catalog_name: ${var.catalog_name}
              schema_name: ${var.schema_name}
          environment_key: default

      environments:
        - environment_key: default
          spec:
            client: "5"
            dependencies:
              - mlflow
              - lightgbm
              - scikit-learn
