# Compare & Test — candidate vs champion batch scoring job.
# Triggered from the Model Development → Compare & Test tab for each
# "Run comparison" action. Writes to {catalog}.{schema}.compare_results.
resources:
  jobs:
    compare_scoring:
      name: "v1 — Compare & test models"
      parameters:
        - name: catalog_name
          default: ${var.catalog_name}
        - name: schema_name
          default: ${var.schema_name}
        - name: model_family
          default: "freq_glm"
        - name: versions
          default: ""                  # CSV list, e.g. "30,31"
        - name: portfolio_size
          default: "5000"
        - name: scenario_id
          default: "none"
        - name: requested_by
          default: "app"

      tasks:
        - task_key: score
          notebook_task:
            notebook_path: ../src/04_models/production/compare_score.py
            base_parameters:
              catalog_name:   ${var.catalog_name}
              schema_name:    ${var.schema_name}
              model_family:   "{{job.parameters.model_family}}"
              versions:       "{{job.parameters.versions}}"
              portfolio_size: "{{job.parameters.portfolio_size}}"
              scenario_id:    "{{job.parameters.scenario_id}}"
              requested_by:   "{{job.parameters.requested_by}}"
          environment_key: compare_env

      environments:
        - environment_key: compare_env
          spec:
            client: "5"
            dependencies:
              - mlflow
              - statsmodels
              - lightgbm
              - scikit-learn
              - databricks-feature-engineering
