# Use Case Jobs — Shadow Pricing, Point-in-Time, New Dataset

resources:
  jobs:
    uc1_shadow_pricing:
      name: "UC1 — Shadow Pricing Impact Analysis"
      parameters:
        - name: catalog_name
          default: ${var.catalog_name}
        - name: schema_name
          default: ${var.schema_name}

      tasks:
        - task_key: shadow_pricing
          notebook_task:
            notebook_path: ../src/05_use_cases/uc1_shadow_pricing.py
            base_parameters:
              catalog_name: ${var.catalog_name}
              schema_name: ${var.schema_name}
          environment_key: default

      environments:
        - environment_key: default
          spec:
            client: "1"

    uc2_point_in_time:
      name: "UC2 — Point-in-Time Backtesting"
      parameters:
        - name: catalog_name
          default: ${var.catalog_name}
        - name: schema_name
          default: ${var.schema_name}
        - name: snapshot_version
          default: "0"

      tasks:
        - task_key: pit_backtesting
          notebook_task:
            notebook_path: ../src/05_use_cases/uc2_point_in_time.py
            base_parameters:
              catalog_name: ${var.catalog_name}
              schema_name: ${var.schema_name}
              snapshot_version: "0"
          environment_key: default

      environments:
        - environment_key: default
          spec:
            client: "1"

    uc3_new_dataset:
      name: "UC3 — New Dataset Addition (Subsidence)"
      parameters:
        - name: catalog_name
          default: ${var.catalog_name}
        - name: schema_name
          default: ${var.schema_name}

      tasks:
        - task_key: new_dataset
          notebook_task:
            notebook_path: ../src/05_use_cases/uc3_new_dataset.py
            base_parameters:
              catalog_name: ${var.catalog_name}
              schema_name: ${var.schema_name}
          environment_key: default

      environments:
        - environment_key: default
          spec:
            client: "1"
