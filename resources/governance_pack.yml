# Governance pack generator — triggered from the Review & Promote tab.
# Generates a single comprehensive PDF for a target UC model version,
# uploads it to /Volumes/{catalog}/{schema}/governance_packs/, and writes
# a row to {catalog}.{schema}.governance_packs_index.
resources:
  jobs:
    governance_pack_generation:
      name: "v1 — Generate governance pack"
      parameters:
        - name: catalog_name
          default: ${var.catalog_name}
        - name: schema_name
          default: ${var.schema_name}
        - name: model_family
          default: "freq_glm"
        - name: model_version
          default: ""
        - name: requested_by
          default: "app"

      tasks:
        - task_key: generate
          notebook_task:
            notebook_path: ../src/04_models/production/governance_pack.py
            base_parameters:
              catalog_name:  ${var.catalog_name}
              schema_name:   ${var.schema_name}
              model_family:  "{{job.parameters.model_family}}"
              model_version: "{{job.parameters.model_version}}"
              requested_by:  "{{job.parameters.requested_by}}"
          environment_key: pack_env

      environments:
        - environment_key: pack_env
          spec:
            client: "5"
            dependencies:
              - mlflow
              - fpdf2
              - matplotlib
              - pyarrow
              - pandas
