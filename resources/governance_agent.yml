# Governance Agent — deploys a real Databricks Agent Framework endpoint.
# Run once (or whenever the agent code changes) to log-and-deploy the agent
# to a model-serving endpoint that the Model Governance chat panel calls.
resources:
  jobs:
    governance_agent_deploy:
      name: "v1 — Deploy governance agent"
      parameters:
        - name: catalog_name
          default: ${var.catalog_name}
        - name: schema_name
          default: ${var.schema_name}
        - name: endpoint_name
          default: "pricing_governance_agent"
        - name: fm_endpoint
          default: "databricks-claude-sonnet-4-6"

      tasks:
        - task_key: deploy
          notebook_task:
            notebook_path: ../src/04_models/production/governance_agent.py
            base_parameters:
              catalog_name:  ${var.catalog_name}
              schema_name:   ${var.schema_name}
              endpoint_name: "{{job.parameters.endpoint_name}}"
              fm_endpoint:   "{{job.parameters.fm_endpoint}}"
          environment_key: agent_env

      environments:
        - environment_key: agent_env
          spec:
            client: "5"
            dependencies:
              - mlflow
              - databricks-agents
              - databricks-sdk
              - pandas
              - pyarrow
