bundle:
  name: pricing-upt-demo

variables:
  catalog_name:
    description: Unity Catalog name for all demo tables
    default: lr_serverless_aws_us_catalog
  schema_name:
    description: Schema name for all demo tables
    default: pricing_upt
  volume_name:
    description: Volume for landing external data files
    default: external_landing
  entity_name:
    description: Name of the reporting undertaking
    default: "Bricksurance SE"

workspace:
  host: https://fevm-lr-serverless-aws-us.cloud.databricks.com
  profile: DEFAULT

sync:
  exclude:
    - src/app/.venv/
    - src/app/frontend/node_modules/
    - docs/
    - "*.bak"
    - data/

targets:
  dev:
    mode: development
    default: true

  prod:
    mode: production

include:
  - resources/*.yml
